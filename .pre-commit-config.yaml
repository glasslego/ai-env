repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      # Linter
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        exclude: ^(tests/|scripts/|\.claude/)
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - types-PyYAML

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # pre-commit: 자동 수정 가능한 문서 불일치 수정 (ruff와 같은 패턴)
      - id: doc-sync-fix
        name: doc-sync-fix
        entry: python scripts/doc_sync_check.py --fix
        language: python
        stages: [pre-commit]
        always_run: true
        pass_filenames: false
      # pre-push: 최종 안전망 (자동 수정 불가 항목 포함 전체 검증)
      - id: doc-sync-check
        name: doc-sync-check
        entry: python scripts/doc_sync_check.py
        language: python
        stages: [pre-push]
        always_run: true
        pass_filenames: false
