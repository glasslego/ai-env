# ai-env 메인 설정
version: "1.0"

# 기본 에이전트
default_agent: claude

# 환경변수 소스 파일
env_file: ".env"

# === AI Providers ===
# 모델은 각 도구에서 최신 버전을 자동으로 사용합니다
providers:
  claude:
    enabled: true
    env_key: ANTHROPIC_API_KEY
    config_dir: ~/.claude

  codex:
    enabled: true
    env_key: OPENAI_API_KEY
    config_dir: ~/.codex

  gemini:
    enabled: true
    env_key: GOOGLE_API_KEY
    config_dir: ~/.gemini
    auth_type: oauth

  antigravity:
    enabled: true
    config_dir: ~/.gemini/antigravity
    uses_gemini_auth: true

# === 출력 경로 (글로벌 설정) ===
outputs:
  # Desktop 앱들
  claude_desktop: ~/Library/Application Support/Claude/claude_desktop_config.json
  chatgpt_desktop: ~/Library/Application Support/ChatGPT/config.json
  antigravity: ~/.gemini/antigravity/mcp_config.json

  # CLI 도구들 (글로벌)
  claude_global: ~/.claude/settings.json
  codex_global: ~/.codex/config.toml
  gemini_global: ~/.gemini/settings.json

  # 로컬 프로젝트 설정 (이 프로젝트 자체용)
  claude_local: ./.claude/settings.local.json
  codex_local: ./.codex/config.toml
  gemini_local: ./.gemini/settings.local.json

  # 기타
  shell_exports: ./generated/shell_exports.sh

# === 글로벌 Claude 설정 (CLAUDE.md, commands, skills) ===
claude_global_config:
  # ai-env에서 관리하는 글로벌 설정 소스
  source_dir: ./.claude/global

  # 동기화 대상 디렉토리
  target_dir: ~/.claude

  # 동기화할 항목들
  sync_items:
    - CLAUDE.md           # 시스템 와이드 규칙
    - commands/           # 슬래시 명령어
    - skills/             # 서브에이전트 스킬

# === 동기화 대상 (글로벌 설정에 반영) ===
sync_targets:
  - claude_desktop
  - antigravity
  - claude_global
  - claude_global_config   # 글로벌 CLAUDE.md, commands, skills
  - shell_exports
